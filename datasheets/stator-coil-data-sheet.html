<style>

  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}

  .note{background:#fff;border-bottom:1px solid var(--line);padding:11px 24px;color:var(--steel);font-size:13px;display:flex;gap:9px;align-items:center;flex:none}
  .note svg{width:16px;height:16px;color:var(--accent);flex:none}
  .frame{flex:1;min-height:0;background:#5b6b7d}
  .frame iframe,.frame embed{width:100%;height:100%;border:0;display:block}
